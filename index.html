<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语学习平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* ========== 顶部导航栏 ========== */
        .top-nav {
            width: 100%;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .top-nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            padding: 0 20px;
            gap: 12px;
        }
        .nav-brand {
            font-weight: bold;
            font-size: 1.15rem;
            color: #667eea;
            text-decoration: none;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-links {
            display: flex;
            gap: 4px;
            list-style: none;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .nav-links::-webkit-scrollbar { display: none; }
        .nav-links a {
            padding: 8px 14px;
            border-radius: 8px;
            text-decoration: none;
            color: #444;
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            transition: all 0.2s;
            display: inline-block;
        }
        .nav-links a:hover { background: #667eea; color: #fff; }
        .nav-links a.active { background: #667eea; color: #fff; }
        .page-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }
        .header {
            margin-bottom: 60px;
            color: white;
        }
        .header h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .header p {
            font-size: 1.2rem;
            opacity: 0.95;
        }
        .menu-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }
        .menu-card {
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .menu-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            background: #f8f9ff;
        }
        .menu-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .menu-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #667eea;
        }
        .menu-desc {
            font-size: 1rem;
            opacity: 0.8;
            line-height: 1.6;
        }
        .footer {
            color: white;
            opacity: 0.8;
            font-size: 0.9rem;
        }
    </style>
</head>

            </ul>
        </div>
    </nav>

    <div class="page-wrap">
    <div class="container">

        </div>

        <div class="menu-buttons">
            <a href="lianxi/index.html" class="menu-card">
                <div class="menu-icon">📚</div>
                <div class="menu-title">练习课程</div>

            <a href="zhishidian/index.html" class="menu-card">

                <div class="menu-title">知识点</div>

            </a>

            <a href="zongjie/index.html" class="menu-card">

                <div class="menu-title">总结资料</div>
                <div class="menu-desc">语法、词汇、句型系统总结<br>知识点归纳，方便复习查阅</div>
            </a>

            <a href="words_game/index.html" class="menu-card">
                <div class="menu-icon">🎮</div>
                <div class="menu-title">单词游戏</div>
                <div class="menu-desc">坦克单词战等趣味游戏<br>边玩边学，轻松记忆单词</div>
            </a>
        </div>

        <div class="footer">
            <p>© 2024 英语学习平台 | 持续更新中</p>
        </div>
    </div>
    </div>
</body>
</html>
